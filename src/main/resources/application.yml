spring:
  application:
    name: BookShop

  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  security:
    user:
      name: admin
      password: admin

server:
  port: 8080

logging:
  level:
    root: INFO
    org.example.bookshop: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
